<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status Pengajuan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

body{
  background:
  radial-gradient(circle at top,#1e3a8a 0%,#0f172a 45%,#020617 100%);
  padding:8px;
  color:#fff;
  zoom:0.92;
  max-width:480px;
  margin:auto;
  overflow-x:hidden;
  min-height:100vh;
}

/* GLASS */

.glass{
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
  0 10px 35px rgba(0,0,0,0.35),
  inset 0 1px 0 rgba(255,255,255,0.08);
}

/* HEADER */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.header h1{
  font-size:17px;
  font-weight:800;
  letter-spacing:.3px;
}

.bantuan{
  padding:7px 13px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  box-shadow:0 5px 20px rgba(37,99,235,.45);
}

/* STEP */

.step-box{
  display:flex;
  justify-content:space-between;
  margin:14px 0 18px;
  padding:14px 8px;
  border-radius:24px;
  position:relative;
}

.step{
  flex:1;
  text-align:center;
  position:relative;
  z-index:2;
}

.line{
  position:absolute;
  top:20px;
  left:60%;
  width:100%;
  height:3px;
  background:rgba(255,255,255,.12);
  overflow:hidden;
  border-radius:20px;
}

.line::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
}

.step:last-child .line{
  display:none;
}

.circle{
  width:42px;
  height:42px;
  margin:auto;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  position:relative;
  z-index:3;
  background:linear-gradient(145deg,#3b82f6,#1d4ed8);
  box-shadow:
  0 8px 20px rgba(37,99,235,.45),
  inset 0 1px 0 rgba(255,255,255,.18);
}

.step.red .circle{
  background:linear-gradient(145deg,#ef4444,#b91c1c);
  box-shadow:
  0 8px 20px rgba(239,68,68,.4),
  inset 0 1px 0 rgba(255,255,255,.15);
}

.step h3{
  margin-top:7px;
  font-size:11px;
  font-weight:700;
}

.step p{
  font-size:8px;
  line-height:1.4;
  color:rgba(255,255,255,.65);
  margin-top:3px;
}

/* ALERT */

.alert{
  border-radius:20px;
  padding:12px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
  overflow:hidden;
}

.alert::before{
  content:'';
  position:absolute;
  inset:0;
  background:
  linear-gradient(135deg,
  rgba(239,68,68,.28),
  rgba(127,29,29,.15));
}

.alert-icon{
  width:42px;
  height:42px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  position:relative;
  z-index:2;
  background:linear-gradient(145deg,#ef4444,#b91c1c);
  box-shadow:0 10px 25px rgba(239,68,68,.35);
}

.alert div{
  position:relative;
  z-index:2;
}

.alert h2{
  font-size:14px;
  font-weight:800;
  margin-bottom:2px;
}

.alert p{
  font-size:10px;
  color:rgba(255,255,255,.75);
}

/* CARD */

.card{
  border-radius:22px;
  padding:13px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;
  top:-80px;
  right:-80px;
  width:160px;
  height:160px;
  background:rgba(255,255,255,.04);
  border-radius:50%;
}

.card-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:12px;
  position:relative;
  z-index:2;
}

/* DETAIL */

.detail-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  position:relative;
  z-index:2;
}

.data{
  flex:1;
}

.row{
  display:flex;
  margin-bottom:8px;
  align-items:center;
}

.row label{
  width:82px;
  font-size:11px;
  color:rgba(255
